name: Package Plugin

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "Syncing info.toml to version: $VERSION"
          sed -i 's/version = .*/version = "'"$VERSION"'"/' info.toml

      - name: Create Package
        run: |
          zip -r ClubManager.op info.toml src/ LICENSE README.md

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClubManager.op
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
